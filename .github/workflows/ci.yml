# CI Pipeline - Nodwin Sales CRM
# Runs on every PR: install, lint, typecheck, vitest, RLS tests (placeholder), build
#
# Tool installation: any new tool used in this workflow MUST be installed via a
# setup action or apt-get earlier in the same job. Do not assume tools are
# pre-installed.
#
# Performance optimizations:
# - Cache pnpm dependencies between runs
# - Use Node 20+ (matches Next.js 15 requirement)
# - Parallelize typecheck and vitest
#
# Expected run time: < 5 minutes on empty repo

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NEXT_TELEMETRY_DISABLED: 1
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 5

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-

      - name: Lint
        run: pnpm lint
        timeout-minutes: 5

      - name: Typecheck
        run: pnpm typecheck
        timeout-minutes: 10

      - name: Run tests
        run: pnpm test
        timeout-minutes: 10

      - name: Run RLS tests (placeholder)
        run: |
          echo "RLS test runner placeholder (T-017 in progress)"
          echo "Running: pnpm db:test || true"
          pnpm db:test || true

      - name: Build
        run: pnpm build
        timeout-minutes: 10

  secret-scan:
    name: Secret Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload gitleaks results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: gitleaks-report.json
          retention-days: 30
