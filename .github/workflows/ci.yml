# CI Pipeline - Nodwin Sales CRM
#
# Runs the checks as INDEPENDENT PARALLEL JOBS so a failure in one (e.g. a unit
# test) does not hide failures in the others (typecheck, build, RLS tests). Every
# job's result is visible at once in the Checks tab.
#
# The "CI Pipeline" job at the end is a lightweight aggregator that depends on all
# the others and fails if any of them failed. It is the REQUIRED status check in
# the branch ruleset — keep that job named exactly "CI Pipeline" so the required
# check keeps resolving. The individual jobs are not required directly.
#
# Notes:
# - pnpm dependency cache between runs; Node 20+ (Next.js 15).
# - Supabase start adds ~3-5 min and runs in parallel with the node jobs.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NEXT_TELEMETRY_DISABLED: 1
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Reject merge conflict markers
        run: |
          if grep -rE '^<{7}|^={7}|^>{7}' --include='*.ts' --include='*.tsx' --include='*.js' --include='*.sql' --include='*.json' --include='*.yml' --include='*.yaml' --include='*.md' . --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=out --exclude-dir=.git; then
            echo "ERROR: Unresolved merge conflict markers found in repository."
            exit 1
          fi

      - name: Verify ESLint custom rule completeness
        run: bash scripts/verify-eslint-rules.sh
        timeout-minutes: 1

      - name: Run RLS policy linter
        run: VRLS_WARNINGS_ARE_ERRORS=1 bash scripts/lint-rls.sh
        timeout-minutes: 2

      - name: Check migration filenames
        run: bash scripts/check-migration-filenames.sh
        timeout-minutes: 1

      - name: Run RLS policy coverage check
        run: bash scripts/check-rls-coverage.sh
        timeout-minutes: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 5
      - name: Lint
        run: pnpm lint
        timeout-minutes: 5

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 5
      - name: Typecheck
        run: pnpm typecheck
        timeout-minutes: 10

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 5
      - name: Run unit tests
        run: pnpm test
        timeout-minutes: 10

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 5
      - name: Build
        run: pnpm build
        timeout-minutes: 10

  db-tests:
    name: Database tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 5

      - name: Normalize Supabase config for CI
        # config.toml hardcodes LAN/Tailscale IPs from the local-preview setup;
        # cloud runners can't reach them, so supabase start's health check times
        # out. Rewrite them to localhost for CI only (committed config untouched).
        run: sed -i 's/192\.168\.88\.51/127.0.0.1/g; s/100\.126\.116\.7/127.0.0.1/g' supabase/config.toml

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinned (not `latest`) so setup-cli makes no unauthenticated GitHub
          # API call to resolve the newest release (was hitting the anon rate limit).
          version: 2.105.0

      - name: Start Supabase local stack
        run: |
          set -o pipefail
          supabase start 2>&1 | tee /tmp/supabase-start.log
          if grep -qiE '(does not have.*(rls|row level security)|rls.*warning|warning.*rls)' /tmp/supabase-start.log; then
            echo "::error::RLS warnings detected in Supabase startup output"
            exit 1
          fi
        # 15 min headroom for slow Docker image pulls (was 8, which timed out).
        timeout-minutes: 15

      - name: Supabase schema lint
        run: supabase db lint --local --level error --fail-on error
        timeout-minutes: 2

      - name: Run RLS tests
        run: pnpm db:test
        timeout-minutes: 5

  # Aggregator — REQUIRED status check. Named "CI Pipeline" to match the branch
  # ruleset. Passes only when every job above succeeded; fails otherwise. Keeping
  # this name means splitting the jobs does not break the required-check config.
  ci-pipeline:
    name: CI Pipeline
    runs-on: ubuntu-latest
    if: always()
    needs: [static-checks, lint, typecheck, unit-tests, build, db-tests]
    steps:
      - name: Verify all CI jobs passed
        run: |
          results='${{ join(needs.*.result, ',') }}'
          echo "Job results: $results"
          case "$results" in
            *failure*|*cancelled*)
              echo "::error::One or more CI jobs failed or were cancelled ($results)"
              exit 1 ;;
            *)
              echo "All CI jobs passed." ;;
          esac
