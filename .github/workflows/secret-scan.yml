# Secret Scanner - Nodwin Sales CRM
# Runs gitleaks on every PR to detect hardcoded secrets and API keys
#
# Uses official gitleaks/gitleaks-action@v2
#
# Expected run time: < 2 minutes on empty repo

name: Secret Scanner

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  secret-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for gitleaks

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install gitleaks
        run: |
          curl -sSfL https://install.gitleaks.io | sh
          echo "$HOME/.gitleaks/bin" >> $GITHUB_PATH

      - name: Run gitleaks
        id: gitleaks
        run: |
          gitleaks detect \
            --source=. \
            --verbose \
            --exit-code 1 \
            --redact \
            --config .gitleaksrc.toml 2>/dev/null || true
          
          # Check for any findings
          if [ -f gitleaks.log ] && [ -s gitleaks.log ]; then
            echo "GITLEAKS_FOUND=true" >> $GITHUB_ENV
            echo "GITLEAKS_LOG=$(cat gitleaks.log)" >> $GITHUB_ENV
            echo "GITLEAKS_MD=$(cat gitleaks.md 2>/dev/null || echo '')" >> $GITHUB_ENV
          else
            echo "GITLEAKS_FOUND=false" >> $GITHUB_ENV
          fi

      - name: Upload gitleaks results
        if: env.GITLEAKS_FOUND == 'true' || always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: |
            gitleaks.log
            gitleaks.md
          retention-days: 30

      - name: Report findings
        if: env.GITLEAKS_FOUND == 'true'
        run: |
          echo "⚠️  Gitleaks found potential secrets:"
          echo "---"
          cat gitleaks.log
          echo "---"
          echo "Please review and remove hardcoded secrets before committing."
