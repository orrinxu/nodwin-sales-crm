# Secret Scanner - Nodwin Sales CRM
# Runs gitleaks on every PR to detect hardcoded secrets and API keys
#
# Tool installation: any new tool used in this workflow MUST be installed via a
# setup action or apt-get earlier in the same job. Do not assume tools are
# pre-installed.
#
# Expected run time: < 2 minutes on empty repo

name: Secret Scanner

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  secret-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for gitleaks

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2.3.7
        with:
          config-path: .gitleaksrc.toml
          redact: true
          report-format: json
          verbose: true

      - name: Upload gitleaks results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: gitleaks-report.json
          retention-days: 30
