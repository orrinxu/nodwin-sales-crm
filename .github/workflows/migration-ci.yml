name: Migration CI

# Runs on every PR to main so the required "Schema Lint & Diff" check always
# reports. The heavy database steps are gated on whether this PR actually
# touches supabase/migrations, /policies, or /seed — when it doesn't, the job
# finishes in seconds and reports success (instead of a path filter leaving the
# required check stuck as "expected", which silently blocks unrelated PRs).
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  migration-checks:
    name: Schema Lint & Diff
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect schema-affecting changes
        id: changes
        run: |
          BASE="${{ github.base_ref }}"
          if [ -z "$BASE" ]; then
            # Manual dispatch (no PR base) — run the full checks.
            echo "schema=true" >> "$GITHUB_OUTPUT"
          else
            git fetch --no-tags --depth=1 origin "$BASE" || true
            if git diff --name-only "origin/$BASE" HEAD | grep -qE '^supabase/(migrations|policies|seed)/'; then
              echo "schema=true" >> "$GITHUB_OUTPUT"
            else
              echo "schema=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: No schema changes — skipping schema lint
        if: steps.changes.outputs.schema != 'true'
        run: echo "No supabase/migrations, /policies, or /seed changes in this PR; nothing to schema-lint."

      - name: Check migration filenames
        if: steps.changes.outputs.schema == 'true'
        run: STRICT_MIGRATION_NAMES=1 bash scripts/check-migration-filenames.sh
        timeout-minutes: 1

      - name: Normalize Supabase config for CI
        if: steps.changes.outputs.schema == 'true'
        # config.toml hardcodes LAN/Tailscale IPs from the local-preview setup;
        # cloud runners can't reach them. Rewrite to localhost for CI only.
        run: sed -i 's/192\.168\.88\.51/127.0.0.1/g; s/100\.126\.116\.7/127.0.0.1/g' supabase/config.toml

      - name: Setup Supabase CLI
        if: steps.changes.outputs.schema == 'true'
        uses: supabase/setup-cli@v1
        with:
          # Pinned (not `latest`) to avoid the anonymous GitHub API rate limit.
          version: 2.105.0

      - name: Start Supabase local stack
        if: steps.changes.outputs.schema == 'true'
        run: supabase start
        # 15 min headroom for slow Docker image pulls (was 8, which timed out).
        timeout-minutes: 15

      - name: Check generated types are up to date
        if: steps.changes.outputs.schema == 'true'
        run: |
          supabase gen types typescript --local --schema public > /tmp/expected.ts
          diff -u apps/web/lib/database.types.ts /tmp/expected.ts
        timeout-minutes: 2

      - name: Schema lint
        if: steps.changes.outputs.schema == 'true'
        run: supabase db lint --local --level error --fail-on error
        timeout-minutes: 2

      - name: Schema diff against main
        if: steps.changes.outputs.schema == 'true' && hashFiles('supabase/.temp/project-ref') != ''
        run: |
          git fetch origin main
          supabase db diff --linked --file /tmp/diff.sql origin/main...HEAD 2>&1 | tee /tmp/diff-output.txt
          if [ -s /tmp/diff.sql ]; then
            echo "## Schema drift detected" >> "$GITHUB_STEP_SUMMARY"
            echo '```sql' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/diff.sql >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No schema drift detected."
          fi
        timeout-minutes: 3
