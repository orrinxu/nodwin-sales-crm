# Deploy pipeline — GitHub-hosted build → DigitalOcean staging VPS.
#
# Split by cost, per the ticket:
#   • push (ANY branch)  → job "checks": cheap lint + typecheck + gitleaks.
#   • push to main       → job "build-and-deploy": build the image, push to
#     ghcr.io, then SSH to the staging VPS and roll the `app` service.
#
# The heavier tests/build/db-tests stay in ci.yml (main + PRs). This workflow is
# intentionally the deploy path only. Target for THIS ticket = STAGING; prod is a
# separate ticket. The image is environment-specific because NEXT_PUBLIC_* are
# baked at build time (see Dockerfile + deploy/README.md).
#
# Secrets / vars this workflow expects (created by a human — out of scope here;
# see deploy/README.md for the full list):
#   vars:    NEXT_PUBLIC_API_URL, NEXT_PUBLIC_SUPABASE_URL,
#            NEXT_PUBLIC_SUPABASE_ANON_KEY, STAGING_COMPOSE_DIR
#   secrets: STAGING_SSH_HOST, STAGING_SSH_USER, STAGING_SSH_KEY (, STAGING_SSH_PORT)

name: Deploy

on:
  push:
  workflow_dispatch:

# Never cancel an in-flight deploy; serialize per ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Cheap checks on every push (any branch) ────────────────────────────────
  checks:
    name: Checks (lint · typecheck · gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
    env:
      GITLEAKS_VERSION: 8.18.4
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan commits and the .gitleaksignore
          # commit-fingerprints resolve.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 5

      - name: Lint
        run: pnpm lint
        timeout-minutes: 5

      - name: Typecheck
        run: pnpm typecheck
        timeout-minutes: 8

      - name: Gitleaks secret scan
        # Run the gitleaks BINARY (not gitleaks-action, which needs a paid license
        # for org repos) against the repo's existing .gitleaksrc.toml config.
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect \
            --source . \
            --config .gitleaksrc.toml \
            --redact \
            --no-banner \
            --exit-code 1
        timeout-minutes: 3

  # ── Build → ghcr → SSH deploy, ONLY on push to main ────────────────────────
  build-and-deploy:
    name: Build and deploy (staging)
    runs-on: ubuntu-latest
    needs: checks
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags (SHA + latest)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEXT_PUBLIC_* are baked into the client bundle here. They are NOT
          # secrets (they ship to the browser), so they live in GitHub *vars*.
          # This ties the resulting image to the STAGING environment.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID=${{ vars.NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID }}
            NEXT_PUBLIC_GOOGLE_PICKER_API_KEY=${{ vars.NEXT_PUBLIC_GOOGLE_PICKER_API_KEY }}
            NEXT_PUBLIC_ENV=staging

      - name: Deploy to staging VPS over SSH
        uses: appleboy/ssh-action@v1
        env:
          # GITHUB_TOKEN can pull this run's freshly-pushed package; forwarded to
          # the VPS just long enough to `docker compose pull`.
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPOSE_DIR: ${{ vars.STAGING_COMPOSE_DIR }}
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || 22 }}
          envs: GHCR_USER,GHCR_TOKEN,COMPOSE_DIR
          script: |
            set -euo pipefail
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd "$COMPOSE_DIR"
            docker compose pull app
            docker compose up -d app
            docker image prune -f
            docker logout ghcr.io
